<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#060c1a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#059669" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SpineSync</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════════════════════════ HEADER -->
  <header id="app-header">
    <div class="header-left">
      <span class="app-logo">⬡</span>
      <span class="app-name">SpineSync</span>
    </div>
    <div class="header-right">
      <button id="btn-theme" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════ VIEWS -->
  <main id="main">

    <!-- TODAY VIEW -->
    <section id="view-today" class="view active" aria-label="Today">
      <div id="today-content">
        <div class="skeleton-block" style="height:120px;border-radius:16px;"></div>
        <div class="skeleton-block" style="height:60px;margin-top:12px;border-radius:12px;"></div>
      </div>
    </section>

    <!-- WORKOUT PREP VIEW -->
    <section id="view-prep" class="view" aria-label="Workout Prep">
      <div id="prep-content" style="padding: 24px 16px; display: flex; flex-direction: column; gap: 16px; height: 100%;">
        <div class="prep-header" style="text-align: center; margin-bottom: 24px;">
          <h2 style="font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Get Ready</h2>
          <p style="color: var(--text-2); margin-top: 8px;">Prepare your space and equipment.</p>
        </div>
        <div id="prep-workout-summary" style="flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; backdrop-filter: blur(12px); box-shadow: var(--z1);">
            <div id="prep-workout-details"></div>
        </div>
        <button id="btn-start-workout-now" class="btn-primary" style="margin-top: auto; padding: 18px; font-size: 18px; box-shadow: 0 4px 14px rgba(5, 150, 105, 0.4);">Begin Session</button>
      </div>
    </section>

    <!-- WORKOUT VIEW -->
    <section id="view-workout" class="view" aria-label="Active Workout">
      <!-- Injected by workout engine -->
    </section>

    <!-- LIBRARY VIEW -->
    <section id="view-library" class="view" aria-label="Exercise Library">
      <div class="view-header">
        <h2>Library</h2>
        <input id="lib-search" type="search" placeholder="Search exercises…" autocomplete="off">
      </div>
      <div id="lib-filters" class="filter-bar"></div>
      <div id="lib-list"></div>
    </section>

    <!-- PROGRESS VIEW -->
    <section id="view-progress" class="view" aria-label="Progress">
      <div class="view-header"><h2>Progress</h2></div>
      <div class="tab-bar" id="progress-tabs">
        <button class="tab-btn active" data-tab="heatmap">Calendar</button>
        <button class="tab-btn" data-tab="charts">Charts</button>
        <button class="tab-btn" data-tab="milestones">Goals</button>
        <button class="tab-btn" data-tab="bolt">BOLT</button>
      </div>
      <div id="progress-content"></div>
    </section>

    <!-- EDIT VIEW -->
    <section id="view-edit" class="view" aria-label="Edit Program">
      <div class="view-header"><h2>Edit Program</h2></div>
      <div class="tab-bar" id="edit-tabs">
        <button class="tab-btn active" data-tab="exercises">Exercises</button>
        <button class="tab-btn" data-tab="sessions">Sessions</button>
        <button class="tab-btn" data-tab="backup">Backup</button>
      </div>
      <div id="edit-content"></div>
    </section>

  </main>

  <!-- ═══════════════════════════════════════════════════ BOTTOM NAV -->
  <nav id="bottom-nav" aria-label="Main navigation">
    <button class="nav-btn active" data-view="today" aria-label="Today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Today</span>
    </button>
    <button class="nav-btn" data-view="library" aria-label="Library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      <span>Library</span>
    </button>
    <button class="nav-btn" data-view="progress" aria-label="Progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      <span>Progress</span>
    </button>
    <button class="nav-btn" data-view="edit" aria-label="Edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>Edit</span>
    </button>
  </nav>

  <!-- ═══════════════════════════════════════════════════ MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div id="modal-box" class="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ TOAST -->
  <div id="toast" class="toast hidden" aria-live="polite"></div>

</div><!-- #app -->

<script src="app.js"></script>
</body>
</html>
